<!DOCTYPE html>
<!--
  generate-icons.html
  Open this page in Chrome, then right-click each canvas and "Save image as"
  to get the PNG icon files required by the extension.

  Save them as:
    icon16.png  → 16×16
    icon32.png  → 32×32
    icon48.png  → 48×48
    icon128.png → 128×128
-->
<html><head><meta charset="UTF-8"><title>Generate Icons</title>
<style>
  body { font: 14px system-ui; padding: 20px; background: #f3f4f6; }
  h2 { margin-bottom: 16px; }
  .grid { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
  canvas { border-radius: 20%; box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; }
  .hint { margin-top: 20px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; max-width: 500px; font-size: 13px; line-height: 1.6; }
  .btn { margin-top: 16px; padding: 8px 18px; background: #1d6f42; color: #fff; border: none; border-radius: 6px; cursor: pointer; font: 600 13px system-ui; }
</style>
</head>
<body>
<h2>Excel Form Filler — Icon Generator</h2>
<div class="grid" id="grid"></div>
<div class="hint">
  <strong>Instructions:</strong><br>
  1. Click <strong>Download All Icons</strong> below to save all 4 PNG files.<br>
  2. Move the downloaded files into the <code>icons/</code> folder of the extension.<br>
  3. Reload the extension in Chrome (<code>chrome://extensions</code> → Reload).
</div>
<button class="btn" onclick="downloadAll()">Download All Icons</button>

<script>
  const SIZES = [16, 32, 48, 128];
  const BG    = '#1d6f42';
  const FG    = '#ffffff';

  function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    const s   = size;
    const r   = s * 0.18; // corner radius

    // Background rounded rect
    ctx.fillStyle = BG;
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, r);
    ctx.fill();

    // Draw a simple spreadsheet grid icon
    ctx.strokeStyle = FG;
    ctx.fillStyle   = FG;
    ctx.lineWidth   = Math.max(1, s * 0.07);
    ctx.lineCap     = 'round';

    const pad = s * 0.18;
    const w   = s - pad * 2;
    const h   = s - pad * 2;

    // Outer rect
    const lw = ctx.lineWidth;
    ctx.strokeRect(pad, pad, w, h);

    // Horizontal dividers
    ctx.beginPath();
    ctx.moveTo(pad, pad + h * 0.38);
    ctx.lineTo(pad + w, pad + h * 0.38);
    ctx.moveTo(pad, pad + h * 0.67);
    ctx.lineTo(pad + w, pad + h * 0.67);
    ctx.stroke();

    // Vertical divider
    ctx.beginPath();
    ctx.moveTo(pad + w * 0.38, pad);
    ctx.lineTo(pad + w * 0.38, pad + h);
    ctx.stroke();
  }

  const grid = document.getElementById('grid');
  const canvases = {};

  SIZES.forEach((size) => {
    const canvas = document.createElement('canvas');
    canvas.width  = size;
    canvas.height = size;
    canvas.title  = `Right-click → Save image as icon${size}.png`;
    drawIcon(canvas, size);
    canvases[size] = canvas;

    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `<span>icon${size}.png</span>`;
    item.prepend(canvas);
    grid.appendChild(item);
  });

  function downloadAll() {
    SIZES.forEach((size) => {
      const a = document.createElement('a');
      a.href     = canvases[size].toDataURL('image/png');
      a.download = `icon${size}.png`;
      a.click();
    });
  }
</script>
</body></html>
