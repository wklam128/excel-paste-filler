<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:440px;height:280px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0f4c2a;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px}
.blob1{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.18) 0%,transparent 70%);top:-80px;right:-60px}
.blob2{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(29,111,66,.4) 0%,transparent 70%);bottom:-60px;left:-40px}
.content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px 28px;text-align:center}
.icon-wrap{width:48px;height:48px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px;margin-bottom:5px}
.tagline{font-size:11px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:14px;max-width:320px}
.features{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.feat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 11px;font-size:10px;font-weight:700;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:4px}
.demo-strip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:9px 14px}
.excel-chip{background:#217346;border-radius:5px;padding:3px 9px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:4px}
.arrow{color:rgba(255,255,255,.5);font-size:14px}
.form-chip{display:flex;gap:4px}
.fbox{width:40px;height:16px;border-radius:4px;border:2px solid #22c55e;background:rgba(34,197,94,.15)}
.fbox.dim{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05)}
.translate-chip{display:flex;align-items:center;gap:4px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;color:#4ade80}
.badge{position:absolute;bottom:14px;right:14px;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:#86efac;letter-spacing:.05em}
</style>
</head>
<body>
<div class="grid"></div>
<div class="blob1"></div>
<div class="blob2"></div>
<div class="content">
  <div class="icon-wrap">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3">
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      <rect x="8" y="2" width="8" height="4" rx="1"/>
    </svg>
  </div>
  <div class="name">Excel Paste Filler</div>
  <div class="tagline">Paste Excel data into any web form instantly.<br>Plus select-to-translate in 4 languages.</div>
  <div class="features">
    <div class="feat">⚡ Paste Fill</div>
    <div class="feat">🌐 Translate</div>
    <div class="feat">🔒 No servers</div>
  </div>
  <div class="demo-strip">
    <div class="excel-chip">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Excel
    </div>
    <div class="arrow">→</div>
    <div class="form-chip">
      <div class="fbox"></div><div class="fbox"></div><div class="fbox dim"></div>
    </div>
    <div class="arrow">·</div>
    <div class="translate-chip">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-2"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
      ID · VI · ZH · EN
    </div>
  </div>
</div>
<div class="badge">FREE · NO SIGN-IN</div>
</body></html>
