<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:440px;height:280px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0f4c2a;position:relative}

/* subtle grid lines */
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px}

/* glow blobs */
.blob1{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.18) 0%,transparent 70%);top:-80px;right:-60px}
.blob2{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(29,111,66,.4) 0%,transparent 70%);bottom:-60px;left:-40px}

.content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:28px 32px;text-align:center}

/* icon */
.icon-wrap{width:52px;height:52px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.3)}

.name{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px;margin-bottom:6px}
.tagline{font-size:12px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:18px;max-width:300px}

/* mini demo strip */
.demo-strip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 16px}
.excel-chip{background:#217346;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px}
.arrow{color:rgba(255,255,255,.5);font-size:14px}
.form-chip{display:flex;gap:5px}
.fbox{width:44px;height:18px;border-radius:4px;border:2px solid #22c55e;background:rgba(34,197,94,.15)}
.fbox.dim{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05)}

/* badge */
.badge{position:absolute;bottom:16px;right:16px;background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:#86efac;letter-spacing:.05em}
</style>
</head>
<body>
<div class="grid"></div>
<div class="blob1"></div>
<div class="blob2"></div>

<div class="content">
  <div class="icon-wrap">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3">
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      <rect x="8" y="2" width="8" height="4" rx="1"/>
    </svg>
  </div>
  <div class="name">Excel Paste Filler</div>
  <div class="tagline">Copy cells from Excel, paste into any web form — adjacent fields fill automatically</div>

  <div class="demo-strip">
    <div class="excel-chip">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Excel
    </div>
    <div class="arrow">→</div>
    <div class="form-chip">
      <div class="fbox"></div>
      <div class="fbox"></div>
      <div class="fbox dim"></div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,.6);margin-left:2px">Ctrl+V</div>
  </div>
</div>

<div class="badge">ALL LOCAL · NO SERVERS</div>
</body></html>
